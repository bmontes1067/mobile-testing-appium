name: 📱 Mobile Tests — Appium

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ─── Validación rápida en cada push ───────────────────────────────────────
  validate:
    name: Lint & Collect
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt flake8

      - name: Collect tests (dry run)
        run: |
          source venv/bin/activate
          pytest --collect-only -q

      - name: Lint
        run: |
          source venv/bin/activate
          flake8 pages/ tests/ utils/ config/ --max-line-length=120 --ignore=E501,W503

  # ─── Tests Android en emulador ────────────────────────────────────────────
  android:
    name: Android Tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Appium
        run: |
          npm install -g appium
          appium driver install uiautomator2
          appium &
          sleep 5

      - name: Download APK
        run: |
          source venv/bin/activate
          python scripts/download_apps.py --platform android

      - name: Start emulator and run tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: |
            source venv/bin/activate
            pytest tests/android/ --platform android -v \
              --html=reports/report-android.html \
              --self-contained-html

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-report
          path: reports/

  # ─── Tests iOS en simulador ───────────────────────────────────────────────
  ios:
    name: iOS Tests
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Install Appium
        run: |
          npm install -g appium
          appium driver install xcuitest
          appium &
          sleep 5

      - name: Download iOS app
        run: |
          source venv/bin/activate
          python scripts/download_apps.py --platform ios

      - name: List available simulators
        run: xcrun simctl list devices available | grep "iPhone"

      - name: Boot simulator
        run: |
          UDID=$(xcrun simctl list devices available | grep "iPhone 15 (" | head -1 | grep -oE '[A-F0-9-]{36}')
          xcrun simctl boot "$UDID" || true
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV

      - name: Run iOS tests
        run: |
          source venv/bin/activate
          pytest tests/ios/ --platform ios -v \
            --html=reports/report-ios.html \
            --self-contained-html
        env:
          IOS_DEVICE_NAME: iPhone 15
          IOS_PLATFORM_VERSION: "17.0"

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-report
          path: reports/
